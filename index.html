<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Homepage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="shop-container">
        <header>
            <h2>Tech Shop</h2>
            <div class="filter-buttons">
                <button onclick="filterProducts('all')">All</button>
                <button onclick="filterProducts('Phones')">Phones</button>
                <button onclick="filterProducts('Laptops')">Laptops</button>
            </div>
        </header>

        <main class="shop-layout">
            <div class="products-grid" id="products-list"></div>

            <aside class="cart-section">
                <h3>Shopping Cart</h3>
                <ul id="cart-list"></ul>
                <div class="cart-total">Total: $<span id="total-price">0</span></div>
            </aside>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
